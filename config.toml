# =============================================================================
# OAuth2 Test Server Configuration Example (TOML)
# =============================================================================
# Copy this to config.toml and mount it into the container
# Example: docker run -v $(pwd)/config.toml:/home/appuser/config/config.toml ...
# =============================================================================

# Server endpoint configuration
scheme = "http"
host = "0.0.0.0"
port = 8090

# OIDC / OAuth capabilities
scopes_supported = ["openid", "profile", "email", "offline_access", "address", "phone"]

claims_supported = [
    "sub",
    "name",
    "given_name",
    "family_name",
    "email",
    "email_verified",
    "picture",
    "locale"
]

grant_types_supported = ["authorization_code", "refresh_token", "client_credentials"]

response_types_supported = ["code", "token", "id_token"]

token_endpoint_auth_methods_supported = [
    "client_secret_basic",
    "client_secret_post",
    "none",
    "private_key_jwt"
]

code_challenge_methods_supported = ["plain", "S256"]

subject_types_supported = ["public"]

id_token_signing_alg_values_supported = ["RS256"]

# Generate client secret for Dynamic Client Registration
generate_client_secret_for_dcr = true

# CORS - leave empty to allow all origins
# allowed_origins = ["http://localhost:3000", "https://example.com"]

# Default user ID for testing
default_user_id = "test-user-123"

# Security settings
require_state = true

# Token expiration times (in seconds)
access_token_expires_in = 3600        # 1 hour
refresh_token_expires_in = 2592000     # 30 days
authorization_code_expires_in = 600    # 10 minutes

# Cleanup interval for expired tokens (in seconds)
cleanup_interval_secs = 300            # 5 minutes
